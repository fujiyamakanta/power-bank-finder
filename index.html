<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぴったりモバイルバッテリー診断</title>
<link rel="stylesheet" href="style.css?v=5">
</head>
<body>
<header class="app-header">
  <h1>ぴったりモバイルバッテリー診断</h1>
  <p class="subtitle">条件を選ぶだけで、あなたに合うモバイルバッテリーを絞り込みます</p>
</header>

<main class="layout">
  <section class="filter-panel" aria-label="検索条件">
    <h2>かんたん診断</h2>
    <p class="panel-hint">気になるものをタップするだけで、合いそうな製品がすぐに表示されます。</p>
    <div class="preset-grid" id="preset-grid">
      <button type="button" class="preset-card" data-preset="light">
        <span class="preset-icon" aria-hidden="true">🪶</span>
        <span class="preset-text">
          <span class="preset-title">とにかく軽くて小さいものがいい</span>
          <span class="preset-desc">持ち運びの負担が少ない軽量モデルを表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card" data-preset="bigCapacity">
        <span class="preset-icon" aria-hidden="true">🧳</span>
        <span class="preset-text">
          <span class="preset-title">旅行や出張でたっぷり使いたい</span>
          <span class="preset-desc">スマホを何回も充電できる大容量モデルを表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card" data-preset="laptop">
        <span class="preset-icon" aria-hidden="true">💻</span>
        <span class="preset-text">
          <span class="preset-title">ノートパソコンも充電したい</span>
          <span class="preset-desc">パソコンの充電にも対応できるパワフルなモデルを表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card" data-preset="magsafe">
        <span class="preset-icon" aria-hidden="true">🧲</span>
        <span class="preset-text">
          <span class="preset-title">iPhoneにくっつけて使いたい</span>
          <span class="preset-desc">MagSafeでマグネットのようにくっつくタイプを表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card" data-preset="appleWatch">
        <span class="preset-icon" aria-hidden="true">⌚</span>
        <span class="preset-text">
          <span class="preset-title">Apple Watchも一緒に充電したい</span>
          <span class="preset-desc">Apple Watch用の充電機能が付いたモデルを表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card" data-preset="noCableNeeded">
        <span class="preset-icon" aria-hidden="true">🔌</span>
        <span class="preset-text">
          <span class="preset-title">ケーブルを持ち歩きたくない</span>
          <span class="preset-desc">ケーブルやプラグが本体に内蔵されたタイプを表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card" data-preset="cheap">
        <span class="preset-icon" aria-hidden="true">💸</span>
        <span class="preset-text">
          <span class="preset-title">とにかく値段を抑えたい</span>
          <span class="preset-desc">5,000円以下で買える製品を表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card" data-preset="multiCharge">
        <span class="preset-icon" aria-hidden="true">👨‍👩‍👧‍👦</span>
        <span class="preset-text">
          <span class="preset-title">まとめて何台も充電したい</span>
          <span class="preset-desc">3台以上同時に充電できるモデルを表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card" data-preset="kawaii">
        <span class="preset-icon" aria-hidden="true">🎀</span>
        <span class="preset-text">
          <span class="preset-title">可愛いデザインがいい</span>
          <span class="preset-desc">丸みやパステルカラーなど可愛い系の見た目を表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card" data-preset="simpleDesign">
        <span class="preset-icon" aria-hidden="true">⚪</span>
        <span class="preset-text">
          <span class="preset-title">シンプルなデザインがいい</span>
          <span class="preset-desc">装飾のないミニマルな見た目を表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card" data-preset="mecha">
        <span class="preset-icon" aria-hidden="true">🤖</span>
        <span class="preset-text">
          <span class="preset-title">ゴツくてかっこいいのがいい</span>
          <span class="preset-desc">ディスプレイ搭載など無骨でタフな見た目を表示します</span>
        </span>
      </button>
      <button type="button" class="preset-card preset-card-reset" data-preset="reset">
        <span class="preset-icon" aria-hidden="true">🔄</span>
        <span class="preset-text">
          <span class="preset-title">条件なしで全部見る</span>
          <span class="preset-desc">絞り込みをやめて、すべての製品を表示します</span>
        </span>
      </button>
    </div>

    <details class="advanced-details" id="advanced-details">
      <summary>もっと細かく条件を指定する(容量・出力・ポート数など)</summary>
      <form id="filter-form">

        <fieldset>
          <legend>タイプ(複数選択可)</legend>
          <div class="chip-group" id="type-group">
            <label class="chip"><input type="checkbox" name="type" value="3in1"><span>3in1</span></label>
            <label class="chip"><input type="checkbox" name="type" value="plug_integrated"><span>ケーブル・プラグ一体型</span></label>
            <label class="chip"><input type="checkbox" name="type" value="apple_watch"><span>Apple Watch専用</span></label>
            <label class="chip"><input type="checkbox" name="type" value="magsafe"><span>MagSafe対応</span></label>
            <label class="chip"><input type="checkbox" name="type" value="connector_integrated"><span>端子一体型</span></label>
            <label class="chip"><input type="checkbox" name="type" value="cable_built_in"><span>ケーブル内蔵型</span></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>デザインの雰囲気(複数選択可)</legend>
          <div class="chip-group" id="design-style-group">
            <label class="chip"><input type="checkbox" name="design_style" value="kawaii"><span>可愛い系</span></label>
            <label class="chip"><input type="checkbox" name="design_style" value="simple"><span>シンプル系</span></label>
            <label class="chip"><input type="checkbox" name="design_style" value="mecha"><span>メカメカ系</span></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>容量(バッテリー持ち)</legend>
          <select name="capacity_min" id="capacity_min">
            <option value="0">指定なし</option>
            <option value="5000">5,000mAh以上</option>
            <option value="10000">10,000mAh以上</option>
            <option value="20000">20,000mAh以上</option>
            <option value="30000">30,000mAh以上</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>重さ(持ち運びやすさ)</legend>
          <select name="weight_max" id="weight_max">
            <option value="0">指定なし</option>
            <option value="150">150g以下(超軽量)</option>
            <option value="200">200g以下</option>
            <option value="300">300g以下</option>
            <option value="500">500g以下</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>薄さ</legend>
          <select name="thickness_max" id="thickness_max">
            <option value="0">指定なし</option>
            <option value="10">10mm以下(超薄型)</option>
            <option value="15">15mm以下</option>
            <option value="20">20mm以下</option>
            <option value="30">30mm以下</option>
          </select>
        </fieldset>

        <fieldset id="color-fieldset" hidden>
          <legend>カラー(複数選択可)</legend>
          <div class="chip-group" id="color-group"></div>
        </fieldset>

        <fieldset>
          <legend>出力(充電の速さ)</legend>
          <select name="output_min" id="output_min">
            <option value="0">指定なし</option>
            <option value="18">18W以上</option>
            <option value="30">30W以上</option>
            <option value="45">45W以上(ノートPC充電可の目安)</option>
            <option value="65">65W以上</option>
            <option value="100">100W以上</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>急速充電規格(複数選択可)</legend>
          <div class="chip-group">
            <label class="chip"><input type="checkbox" name="fast_charge" value="PD"><span>PD</span></label>
            <label class="chip"><input type="checkbox" name="fast_charge" value="QC"><span>QC</span></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>ポート数</legend>
          <select name="ports_min" id="ports_min">
            <option value="0">指定なし</option>
            <option value="1">1以上</option>
            <option value="2">2以上</option>
            <option value="3">3以上</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>同時充電したい台数</legend>
          <select name="simultaneous_min" id="simultaneous_min">
            <option value="0">指定なし</option>
            <option value="2">2台以上</option>
            <option value="3">3台以上</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>価格帯(上限)</legend>
          <select name="price_max" id="price_max">
            <option value="0">指定なし</option>
            <option value="3000">3,000円以下</option>
            <option value="5000">5,000円以下</option>
            <option value="8000">8,000円以下</option>
            <option value="12000">12,000円以下</option>
            <option value="20000">20,000円以下</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>安全基準</legend>
          <label class="checkbox-line">
            <input type="checkbox" name="pse_required" id="pse_required">
            <span>PSEマーク表示のある製品のみ</span>
          </label>
        </fieldset>

        <p class="live-count-hint" id="live-count-hint"></p>
        <div class="form-actions">
          <button type="submit" class="btn-primary">この条件で提案する</button>
          <button type="reset" class="btn-secondary" id="reset-btn">条件をリセット</button>
        </div>
      </form>
    </details>
  </section>

  <section class="results-panel" aria-label="検索結果">
    <div class="results-header">
      <h2>提案結果</h2>
      <div class="sort-control">
        <label for="sort-select">並び替え:</label>
        <select id="sort-select">
          <option value="price_asc">価格が安い順</option>
          <option value="price_desc">価格が高い順</option>
          <option value="capacity_desc">容量が大きい順</option>
          <option value="weight_asc">軽い順</option>
        </select>
      </div>
    </div>
    <div id="active-conditions" class="active-conditions"></div>
    <p id="result-count" class="result-count"></p>
    <div id="result-list" class="result-list"></div>
  </section>
</main>

<footer class="app-footer">
  <p>掲載データは仕様確認時点の情報です。購入前に必ず販売ページで最新情報をご確認ください。</p>
</footer>

<script src="app.js?v=7"></script>
</body>
</html>
